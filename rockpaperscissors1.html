<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    playGame('rock');
    ">Rock</button> 

    <button onclick="
    playGame('paper');
    ">Paper</button>

    <button onclick="
    playGame('scissors');
    ">Scissors</button>
    
    <button onclick="
    scores.wins = 0;
    scores.losses = 0;
    scores.ties = 0;
    localStorage.setItem('scores', JSON.stringify(scores));">Reset Scores</button>
    
    <script>

        let scores = JSON.parse(localStorage.getItem('scores')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };

        function pickComputerMove() {
            const randomNumber = Math.random();
            let computerMove = '';
            if (randomNumber >=0 && randomNumber < 1/3) computerMove = 'rock';
            if (randomNumber >= 1/3 && randomNumber < 2/3) computerMove = 'paper';
            if (randomNumber >= 2/3 && randomNumber < 1) computerMove = 'scissors';
            return computerMove;
        }

        function playGame(playerMove) {
            const computerMove = pickComputerMove();
            let result = '';
            if(computerMove === playerMove) {
                result = 'Tie';
                scores.ties++;
            } else if((computerMove === 'paper' && playerMove === 'rock') ||
                computerMove === 'rock' && playerMove === 'scissors' ||
                computerMove === 'scissors' && playerMove === 'paper') {
                result = 'You Lose';
                scores.losses++;
            } else {
                result = 'You Win';
                scores.wins++;
            }

            localStorage.setItem('scores', JSON.stringify(scores))

            alert('You picked ' + playerMove + '. Computer picked ' + computerMove + '. ' + result +
                '\nWins: ' + scores.wins + ', Losses: ' + scores.losses + ', Ties: ' + scores.ties
            );
        }

    </script>
</body>
</html>
