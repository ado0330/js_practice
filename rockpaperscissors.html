<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
    playGame('rock');
    ">Rock</button> 

    <button onclick="
    playGame('paper');
    ">Paper</button>

    <button onclick="
    playGame('scissors');
    ">Scissors</button>
    <script>

        function pickComputerMove() {
            const randomNumber = Math.random();
            if (randomNumber >=0 && randomNumber < 1/3) computerMove = 'rock';
            if (randomNumber >= 1/3 && randomNumber < 2/3) computerMove = 'paper';
            if (randomNumber >= 2/3 && randomNumber < 1) computerMove = 'scissors';
            return computerMove;
        }

        function playGame(playerMove) {
            const computerMove = pickComputerMove();
            if(computerMove === playerMove) result = 'Tie';
            else if((computerMove === 'paper' && playerMove === 'rock') ||
                computerMove === 'rock' && playerMove === 'scissors' ||
                computerMove === 'scissors' && playerMove === 'paper') result = 'You Lose';
            else result = 'You Win';

            alert('You picked ' + playerMove + '. Computer picked ' + computerMove + '. ' + result);
        }

    </script>
</body>
</html>
